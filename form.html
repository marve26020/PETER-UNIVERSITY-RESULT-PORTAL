<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
    <link
      rel="icon"
      href="https://puni.edu.ng/uploads/img/favicon.ico"
      sizes="any"/>
     <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <!-- <link rel="stylesheet" href="\PETER-UNIVERSITY-RESULT-PORTAL\BUILDING SMALL\form\style.css"> -->
    <link rel="stylesheet" href="\PETER-UNIVERSITY-RESULT-PORTAL\form.css">
    <link rel="stylesheet" href="style.css" />
</head>
<body class="form-body">
  <header class="head">
      <img
        src="\PETER-UNIVERSITY-RESULT-PORTAL\nav-logo.png"
        alt="PUNI-Logo"
        class="nav-image"
      />
      <div class="nav">
        <ul>
          <li>
            <a href="\PETER-UNIVERSITY-RESULT-PORTAL\index.html"
              ><i class="bi bi-house-door-fill"></i>HOME</a
            >
          </li>
          <li>
            <a href="https://www.puni.edu.ng/"
              ><i class="bi bi-file-person-fill"></i>ABOUT US</a
            >
          </li>
        </ul>
      </div>
    </header>

    <form id="resultForm">
        <div class="form-group">
            <img
          src="\PETER-UNIVERSITY-RESULT-PORTAL\BUILDING SMALL\form\image.png"
          alt="PUNI-Logo"
          class="nav-image2"
        />
            <label for="regno" style="color: #003366;">REG NO:</label>
            <input 
  type="text" 
  id="regNo" 
  inputmode="numeric" 
  pattern="[0-9]{7}" 
  maxlength="7" 
  required 
    oninput="this.value = this.value.replace(/[^0-9]/g, ''); /* If you want to immediately delete any non-numeric letters a user tries to paste or type, add an oninput listener:*/"   
  title="Please enter exactly 7 numbers.">
        </div>
        <button type="submit" class="btn">Check Result</button> 
        <div class="😅">
            <h3 style="color: #003366;"</h3>Please provide the first seven digit of your registration number - 20 xxx xx</h3>
        </div>

    </form>
    <footer class="footer">

        href="https://www.linkedin.com/in/marvellous-okoli/"

        >Site Credits: Okoli Marvellous Chidera</a
      >
    </footer>
     <!-- Link your JS file here -->

</body>
</html>
